servers:
  - url: https://api.smartlyq.com/v1
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Articles
    description: Long-form article generation and management
  - name: Images
    description: AI image generation and listing
  - name: Videos
    description: AI video generation and listing
  - name: Social
    description: Social accounts and post scheduling
  - name: Content
    description: Content rewriting
  - name: Audio
    description: Text-to-speech and speech-to-text
  - name: URLs
    description: URL shortening and analytics
  - name: AI Captain
    description: AI Captain conversations
  - name: Chatbot
    description: Chatbots, training, and conversations
  - name: Media
    description: Media library and uploads
  - name: Analytics
    description: Analytics overview and reports
  - name: Jobs
    description: Async job status and cancellation
  - name: Account
    description: Current user, usage, and balance

paths:
  /articles/generate:
    post:
      summary: Generate article
      description: Start article generation. Returns 202 with job_id; poll GET /jobs/{job_id} for result.
      operationId: generateArticle
      tags: [Articles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleGenerateRequest'
      responses:
        '202':
          description: Accepted; poll job for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /articles:
    get:
      summary: List articles
      operationId: listArticles
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of articles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /articles/{article_id}:
    get:
      summary: Get article
      operationId: getArticle
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
      responses:
        '200':
          description: Single article
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Delete article
      operationId: deleteArticle
      tags: [Articles]
      parameters:
        - $ref: '#/components/parameters/ArticleIdParam'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /images/generate:
    post:
      summary: Generate image
      description: May return 202 with job_id for async generation; otherwise 201 with image.
      operationId: generateImage
      tags: [Images]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageGenerateRequest'
      responses:
        '201':
          description: Image created (sync)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingleResponse'
        '202':
          description: Accepted; poll job for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /images:
    get:
      summary: List images
      operationId: listImages
      tags: [Images]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /images/{image_id}:
    get:
      summary: Get image
      operationId: getImage
      tags: [Images]
      parameters:
        - $ref: '#/components/parameters/ImageIdParam'
      responses:
        '200':
          description: Single image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Delete image
      operationId: deleteImage
      tags: [Images]
      parameters:
        - $ref: '#/components/parameters/ImageIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /videos/models:
    get:
      summary: List available video models
      description: |
        Returns every model currently available for video generation, including the valid
        parameter values for each model and generation type. Call this endpoint before
        submitting a generation request to discover what options a specific model supports.

        Empty arrays (`[]`) indicate that the parameter is not applicable for that model/type
        combination. Boolean `supports_*` flags indicate optional feature availability.
      operationId: listVideoModels
      tags: [Videos]
      security:
        - BearerAuth: [videos:read]
      responses:
        '200':
          description: List of available models with their capabilities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoModelsResponse'
              example:
                success: true
                data:
                  - model: kling-v2-1
                    type: text_to_video
                    params:
                      duration: [5, 10]
                      resolution: []
                      mode: [Standard, Professional]
                      aspect_ratio: ["16:9", "9:16", "1:1"]
                      style: []
                      movement: []
                      supports_negative_prompt: true
                      supports_seed: false
                      supports_generate_audio: false
                      supports_camera_fixed: false
                      prompt_max_length: 2500
                  - model: pixverse-v4-5
                    type: text_to_video
                    params:
                      duration: [5, 8]
                      resolution: [360p, 540p, 720p, 1080p]
                      mode: [Normal, Fast]
                      aspect_ratio: ["16:9", "9:16", "1:1", "4:3", "3:4"]
                      style: [Auto, Anime, 3D Animation, Comic, Clay, Cyberpunk]
                      movement: []
                      supports_negative_prompt: false
                      supports_seed: true
                      supports_generate_audio: false
                      supports_camera_fixed: false
                      prompt_max_length: 2000
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /videos/generate:
    post:
      summary: Generate video
      description: |
        Submits a video generation request. Returns `202 Accepted` immediately with a
        `job_uid`; poll `GET /v1/jobs/{job_uid}` for status and the final video URL.

        **Before submitting:** call `GET /v1/videos/models` to retrieve the valid
        parameter values (`duration`, `resolution`, `mode`, `aspect_ratio`, etc.) for
        your chosen model. Passing an unsupported value returns a `422` validation error.

        **Billing:** the cost is deducted from your API wallet when the job is accepted.
        If video generation fails on the provider side the charge is automatically refunded.
      operationId: generateVideo
      tags: [Videos]
      security:
        - BearerAuth: [videos:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoGenerateRequest'
            examples:
              text_to_video:
                summary: Text-to-video (Kling v2.1)
                value:
                  model: kling-v2-1
                  type: text_to_video
                  prompt: "A lone astronaut walks across a crimson desert at sunset"
                  duration: 10
                  mode: Professional
                  aspect_ratio: "16:9"
              image_to_video:
                summary: Image-to-video (Pixverse v4.5)
                value:
                  model: pixverse-v4-5
                  type: image_to_video
                  image_url: "https://example.com/my-image.jpg"
                  prompt: "Camera slowly pulls back to reveal the full scene"
                  duration: 5
                  resolution: 1080p
                  style: Anime
      responses:
        '202':
          description: Accepted — poll `GET /v1/jobs/{job_uid}` for result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoJobCreatedResponse'
              example:
                success: true
                data:
                  job_uid: job_a1b2c3d4e5f6
                  status: queued
                usage:
                  units: 1
                  cost: "0.2800"
                  balance_remaining: "14.7200"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /videos:
    get:
      summary: List videos
      operationId: listVideos
      tags: [Videos]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /videos/{video_id}:
    get:
      summary: Get video
      operationId: getVideo
      tags: [Videos]
      parameters:
        - $ref: '#/components/parameters/VideoIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Delete video
      operationId: deleteVideo
      tags: [Videos]
      parameters:
        - $ref: '#/components/parameters/VideoIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /social/accounts:
    get:
      summary: List social accounts
      operationId: listSocialAccounts
      tags: [Social]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialAccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /social/posts:
    post:
      summary: Create post (publish immediately)
      operationId: createSocialPost
      tags: [Social]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialPostCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      summary: List social posts
      operationId: listSocialPosts
      tags: [Social]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, published, failed]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPostListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /social/posts/schedule:
    post:
      summary: Schedule post
      operationId: scheduleSocialPost
      tags: [Social]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialPostCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /social/posts/{post_id}:
    get:
      summary: Get social post
      operationId: getSocialPost
      tags: [Social]
      parameters:
        - $ref: '#/components/parameters/PostIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPostSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      summary: Update social post
      operationId: updateSocialPost
      tags: [Social]
      parameters:
        - $ref: '#/components/parameters/PostIdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                scheduled_at:
                  type: string
                  format: date-time
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPostSingleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Delete social post
      operationId: deleteSocialPost
      tags: [Social]
      parameters:
        - $ref: '#/components/parameters/PostIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /content/rewrite:
    post:
      summary: Rewrite content
      operationId: rewriteContent
      tags: [Content]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContentRewriteRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentRewriteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /audio/text-to-speech:
    post:
      summary: Text to speech
      operationId: textToSpeech
      tags: [Audio]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextToSpeechRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioSingleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/InsufficientBalance'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /audio/speech-to-text:
    post:
      summary: Speech to text
      operationId: speechToText
      tags: [Audio]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SpeechToTextRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioSingleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
