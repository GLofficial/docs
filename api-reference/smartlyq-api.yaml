components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: sqk_live_* or sqk_test_*
      description: API key from Developer dashboard (Bearer token).

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based).
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: Items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CursorParam:
      name: cursor
      in: query
      description: Cursor for pagination.
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Max items (cursor-based).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      description: Sort field and direction (e.g. created_at:desc).
      schema:
        type: string
    ArticleIdParam:
      name: article_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ImageIdParam:
      name: image_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    VideoIdParam:
      name: video_id
      in: path
      required: true
      schema:
        type: string
    PostIdParam:
      name: post_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AudioIdParam:
      name: audio_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UrlIdParam:
      name: url_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ConversationIdParam:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    ChatbotIdParam:
      name: id
      in: path
      required: true
      description: Chatbot ID.
      schema:
        type: string
    ConvIdParam:
      name: conv_id
      in: path
      required: true
      description: Conversation ID.
      schema:
        type: string
    MediaIdParam:
      name: media_id
      in: path
      required: true
      schema:
        type: string
    AccountIdParam:
      name: account_id
      in: path
      required: true
      schema:
        type: string
    JobIdParam:
      name: job_id
      in: path
      required: true
      schema:
        type: string

  headers:
    X-RateLimit-Limit:
      description: Max requests per window.
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Remaining requests in window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: Unix timestamp when window resets.
      schema:
        type: integer
    X-Request-ID:
      description: Request ID for support.
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InsufficientBalance:
